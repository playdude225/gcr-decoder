<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>GCR Decoder Add-in</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 15px; margin: 0; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        textarea { 
            width: 100%; height: 120px; background: #1e293b; color: #f8fafc; 
            border: 1px solid #334155; padding: 10px; border-radius: 4px; font-family: monospace;
            box-sizing: border-box;
        }
        button { 
            background: #3b82f6; border: none; padding: 10px; color: white; 
            cursor: pointer; font-weight: bold; border-radius: 4px;
        }
        button#load-btn { background: #10b981; margin-bottom: 5px; }
        h3 { color: #60a5fa; margin: 15px 0 5px 0; font-size: 1.1em; }
        
        /* Rozbor štýl */
        .output-container { background: #1e293b; border-radius: 8px; border: 1px solid #334155; }
        .data-row { padding: 10px; border-bottom: 1px solid #334155; }
        .label { font-size: 0.7em; color: #94a3b8; text-transform: uppercase; display: block; }
        .value { font-size: 1em; font-weight: bold; color: #fde047; font-family: monospace; }
        .status-tag { padding: 2px 5px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .prilet { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .odlet { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
        
        .reply-box { 
            background: #000; color: #10b981; padding: 10px; border-radius: 4px; 
            font-family: monospace; font-size: 0.9em; white-space: pre-wrap;
            border: 1px solid #10b981; min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="load-btn">📥 Načítať text z e-mailu</button>
        <textarea id="input" placeholder="Tu sa objaví text mailu..."></textarea>
        <button id="decode-btn">Dekódovať manuálne</button>

        <h3>🔍 Rozbor</h3>
        <div id="decoded" class="output-container"></div>

        <h3>📝 Odpoveď</h3>
        <div id="reply" class="reply-box"></div>
    </div>

    <script src="taskpane.js"></script>
</body>
</html>
